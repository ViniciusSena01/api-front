<div class="promo-banner">
  <span class="promo-banner__text">
    Dropbox Passwords remembers your login credentials, so you don't have to.
  </span>
  <button type="button" class="promo-banner__close-btn" aria-label="Fechar banner">
    &times;
  </button>
</div>

<!--O layout principal de duas colunas-->>
<main class="login-container">

  <!--Coluna esquerda: Ilustração-->
   <div class="login-container__illustration">
  <img src="/hand_card_reader.png" alt="Ilustração de cartão de acesso" class="login-container__image">
</div>

  <!--Coluna direita: Formulário-->
  <div class="login-container__form-wrapper">

    <!--Formulário principal-->
    <form class="login-form">
      <div class="login-form__header">
  <h2 class="login-form__title">Sign in</h2>
  <span class="login-form__signup-text">
    or <a href="#" class="login-form__signup-link">create an account</a>
  </span>
</div>
<div class="login-form__sso-container">

  <!-- Botão Google atualizado com Ícone -->
  <button type="button" class="login-form__sso-button login-form__sso-button--google">
    <svg class="login-form__sso-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
      <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
      <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.06H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.94l2.85-2.22.81-.63z" fill="#FBBC05"/>
      <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.06l3.66 2.84c.87-2.6 3.3-4.52 6.16-4.52z" fill="#EA4335"/>
    </svg>
    <span class="login-form__sso-text">Sign in with Google</span>
  </button>
  <!-- Botão Apple atualizado com Ícone -->
  <button type="button" class="login-form__sso-button login-form__sso-button--apple">
    <svg class="login-form__sso-icon" width="18" height="18" viewBox="0 0 24 24" fill="#FFFFFF" xmlns="http://www.w3.org/2000/svg">
      <path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.81-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M15.97 4.17c.66-.81 1.11-1.93.99-3.06-1 .04-2.21.67-2.93 1.49-.62.69-1.16 1.84-1.01 2.96 1.1.09 2.23-.58 2.95-1.39z"/>
    </svg>
    <span class="login-form__sso-text">Sign in with Apple</span>
  </button>
</div>
<div class="login-form__divider">
  <span class="login-form__divider-text">or</span>
</div>
<div class="login-form__field">
  <label for="email" class="login-form__label">Email address</label>
  <input type="email" id="email" class="login-form__input" placeholder="Email" required>
  <div class="login-form__error" id="email-error">Please enter a valid email address.</div>
</div>

<div class="login-form__field">
  <label for="password" class="login-form__label">Password</label>
  <input type="password" id="password" class="login-form__input" placeholder="Password" required>
  <div class="login-form__error" id="password-error">Please enter a password.</div>
</div>

<!-- Ações Principais (Checkbox e Botão alinhados lado a lado) -->
<div class="login-form__actions">
  <label class="login-form__remember-me">
    <input type="checkbox" id="remember-me" class="login-form__checkbox">
    Remember me
  </label>
  <button type="submit" class="login-form__submit-button">Sign in</button>
</div>

<!-- Link de recuperação isolado abaixo -->
<a href="#" class="login-form__forgot-link">Forgotten your password?</a>






    </form>

    <!--Area de links de rodapé-->

  </div>
</main>
