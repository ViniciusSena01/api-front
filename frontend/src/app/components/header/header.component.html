<header class="header">
  <!-- Logotipo da Loja (Fonte Grande) -->
  <div class="header__logo">
    <a href="/">
      <span class="header__logo-brand">Vinissão</span><span class="header__logo-sub">Games</span>
    </a>
  </div>

  <!-- Barra de Pesquisa Funcional (Centro) -->
  <div class="header__search">
    <input type="text" class="header__search-input" placeholder="O que você procura?">
    <button class="header__search-button" aria-label="Pesquisar">
      <i class="fa-solid fa-magnifying-glass"></i>
    </button>
  </div>

  <!-- Navegação Principal (Sem redes sociais, apenas links diretos) -->
  <nav class="header__nav">
    <ul class="header__nav-list">

      <li class="header__nav-item">
        <a href="#" class="header__nav-link">
          Produtos
        </a>
      </li>

      <li class="header__nav-item">
        <a href="#" class="header__nav-link header__nav-link--cart">
          Carrinho
          <div class="header__cart-wrapper">
            <i class="fa-solid fa-cart-arrow-down header__cart-icon"></i>
            <span class="header__cart-badge">0</span>
          </div>
        </a>
      </li>

      <!-- Contato como página simples -->
      <li class="header__nav-item">
        <a href="#" class="header__nav-link">
          Contato
        </a>
      </li>

    </ul>
  </nav>
</header>
